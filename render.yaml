services:
  - type: web
    name: golf-coach-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python http_server.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: AUTH_TOKEN
        generateValue: true
